# Repo-root deploy. In Netlify UI: clear custom publish path so this file is used.
[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Correct MIME types for Vite bundles (fixes module script / octet-stream errors)
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — only when no static file exists (do not use force)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
